server:
  port: 9090

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] [correlationId=%X{correlationId:-}] [${spring.application.name:-application}] %logger{36} - %msg%n"
  level:
    com.damu: INFO
    org.springframework.cloud.gateway: INFO

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
      export:
        enabled: ${ZIPKIN_ENABLED:false}

app:
  security:
    jwt:
      issuer: ${IAM_JWT_ISSUER:http://localhost:8083}
      audience: ${IAM_JWT_AUDIENCE:shop-api}
      secret: ${IAM_JWT_SECRET:2MYI7CSmDvVcNU3IdTyE/rpzUGNkR2cPeabl5+/nuHdukRpVTbiKlwoWRfiZMbKf216DVmqzmnjLyAhgFOstUA==}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: API Gateway
        url: /v3/api-docs
      - name: Order Service
        url: /order/v3/api-docs
      - name: Payment Service
        url: /payment/v3/api-docs
      - name: Product Service
        url: /product/v3/api-docs
      - name: User Service
        url: /user/v3/api-docs

spring:
  application:
    name: API-GATEWAY
  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:9296}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: USER-SERVICE-AUTH
              uri: lb://USER-SERVICE
              predicates:
                - Path=/auth/**
            - id: ORDER-SERVICE-OPENAPI
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order/v3/api-docs
              filters:
                - StripPrefix=1
            - id: PAYMENT-SERVICE-OPENAPI
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payment/v3/api-docs
              filters:
                - StripPrefix=1
            - id: PRODUCT-SERVICE-OPENAPI
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/product/v3/api-docs
              filters:
                - StripPrefix=1
            - id: USER-SERVICE-OPENAPI
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user/v3/api-docs
              filters:
                - StripPrefix=1
            - id: ORDER-SERVICE
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: ORDER-SERVICE
                    fallbackUri: forward:/orderServiceFallBack
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 1
                    redis-rate-limiter.burstCapacity: 1
            - id: PAYMENT-SERVICE
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payment/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: PAYMENT-SERVICE
                    fallbackUri: forward:/paymentServiceFallBack
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 1
                    redis-rate-limiter.burstCapacity: 1
            - id: PRODUCT-SERVICE
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/product/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: PRODUCT-SERVICE
                    fallbackUri: forward:/productServiceFallBack
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 1
                    redis-rate-limiter.burstCapacity: 1
            - id: USER-SERVICE
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: USER-SERVICE
                    fallbackUri: forward:/userServiceFallBack
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 4

resilience4j:
  timelimiter:
    instances:
      ORDER-SERVICE:
        timeout-duration: 5s
      PAYMENT-SERVICE:
        timeout-duration: 5s
      PRODUCT-SERVICE:
        timeout-duration: 5s
      USER-SERVICE:
        timeout-duration: 5s
