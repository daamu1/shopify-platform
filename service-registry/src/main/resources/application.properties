server.port=8761

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] [correlationId=%X{correlationId:-}] [${spring.application.name:-service-registry}] %logger{36} - %msg%n
logging.level.com.damu=INFO
logging.level.com.netflix.eureka=INFO

eureka.instance.hostname=localhost
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
