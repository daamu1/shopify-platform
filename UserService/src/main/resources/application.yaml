server:
  port: 8083

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] [correlationId=%X{correlationId:-}] [${spring.application.name:-application}] %logger{36} - %msg%n"
  level:
    com.damu: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
      export:
        enabled: ${ZIPKIN_ENABLED:false}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/userdb
    username: damu
    password: password123
    driverClassName: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
  application:
    name: USER-SERVICE
  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:9296}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

app:
  auth:
    email-verification-url: ${EMAIL_VERIFICATION_URL:http://localhost:9090/user/verify-email}
    password-reset-url: ${PASSWORD_RESET_URL:http://localhost:9090/user/reset-password}
  rabbitmq:
    exchange: notification.exchange
    routing-key: notification.event
  security:
    jwt:
      issuer: ${IAM_JWT_ISSUER:http://localhost:8083}
      audience: ${IAM_JWT_AUDIENCE:shop-api}
      secret: ${IAM_JWT_SECRET:2MYI7CSmDvVcNU3IdTyE/rpzUGNkR2cPeabl5+/nuHdukRpVTbiKlwoWRfiZMbKf216DVmqzmnjLyAhgFOstUA==}
      access-token-ttl-minutes: ${IAM_ACCESS_TOKEN_TTL_MINUTES:15}
      refresh-token-ttl-days: ${IAM_REFRESH_TOKEN_TTL_DAYS:30}
