server:
  port: 8085

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] [correlationId=%X{correlationId:-}] [${spring.application.name:-application}] %logger{36} - %msg%n"
  level:
    com.damu: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
      export:
        enabled: ${ZIPKIN_ENABLED:false}

app:
  security:
    jwt:
      issuer: ${IAM_JWT_ISSUER:http://localhost:8083}
      audience: ${IAM_JWT_AUDIENCE:shop-api}
      secret: ${IAM_JWT_SECRET:2MYI7CSmDvVcNU3IdTyE/rpzUGNkR2cPeabl5+/nuHdukRpVTbiKlwoWRfiZMbKf216DVmqzmnjLyAhgFOstUA==}
  notification:
    email:
      provider: sendgrid
      from: ${NOTIFICATION_EMAIL_FROM:no-reply@shop.local}
    sendgrid:
      base-url: ${SENDGRID_BASE_URL:https://api.sendgrid.com}
      api-key: ${SENDGRID_API_KEY:}
    webhook:
      timeout: 5s
    retry:
      max-attempts: ${NOTIFICATION_MAX_ATTEMPTS:4}
  rabbitmq:
    exchange: notification.exchange
    events-queue: notification.events.queue
    retry-queue: notification.events.retry.queue
    dead-letter-queue: notification.events.dlq
    routing-key: notification.event
    dead-routing-key: notification.dead

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

spring:
  application:
    name: NOTIFICATION-SERVICE
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:9296}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:3306/notificationdb}
    username: ${SPRING_DATASOURCE_USERNAME:damu}
    password: ${SPRING_DATASOURCE_PASSWORD:password123}
    driverClassName: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
