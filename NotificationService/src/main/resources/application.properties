server.port=8085
spring.output.ansi.enabled=ALWAYS

logging.level.com.damu=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
management.zipkin.tracing.export.enabled=${ZIPKIN_ENABLED:false}

app.security.jwt.issuer=${IAM_JWT_ISSUER:http://localhost:8083}
app.security.jwt.audience=${IAM_JWT_AUDIENCE:shop-api}
app.security.jwt.public-key=${IAM_JWT_PUBLIC_KEY:}
app.notification.email.provider=sendgrid
app.notification.email.from=${NOTIFICATION_EMAIL_FROM:no-reply@shop.local}
app.notification.sendgrid.base-url=${SENDGRID_BASE_URL:https://api.sendgrid.com}
app.notification.sendgrid.api-key=${SENDGRID_API_KEY:}
app.notification.webhook.timeout=5s
app.notification.retry.max-attempts=${NOTIFICATION_MAX_ATTEMPTS:4}
app.rabbitmq.exchange=notification.exchange
app.rabbitmq.events-queue=notification.events.queue
app.rabbitmq.retry-queue=notification.events.retry.queue
app.rabbitmq.dead-letter-queue=notification.events.dlq
app.rabbitmq.routing-key=notification.event
app.rabbitmq.dead-routing-key=notification.dead

springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

spring.application.name=NOTIFICATION-SERVICE
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:9296}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:3306/notificationdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:damu}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password123}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
